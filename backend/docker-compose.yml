services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: farmassist
      POSTGRES_PASSWORD: farmassist
      POSTGRES_DB: farmassist
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    environment:
      PORT: 8080
      DATABASE_URL: postgres://farmassist:farmassist@db:5432/farmassist?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
